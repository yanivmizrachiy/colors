<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>צבעים — colors</title>
  <meta name="theme-color" content="#1E3A8A">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="colors-gallery.css">
</head>
<body>
  <main class="color-page">
    <header class="color-hero compact">
      <div>
        <p class="eyebrow">בחירת צבע מהירה</p>
        <h1>צבעים</h1>
        <p>בחר משפחה, ראה משבצות צבע, העתק Prompt.</p>
      </div>
      <a class="back-link" href="index.html">חזרה</a>
    </header>

    <section class="family-strip" id="familyStrip" aria-label="משפחות צבעים"></section>
    <section class="shade-strip" id="shadeStrip" aria-label="גוונים"></section>

    <section class="color-toolbar slim" aria-label="פעולות צבעים">
      <input id="colorSearch" type="search" aria-label="חיפוש לפי צבע, מספר, HEX או שימוש">
      <select id="colorUseFilter" aria-label="סינון לפי שימוש"><option value="הכול">כל השימושים</option></select>
      <button id="copyVisibleColors" type="button">העתק סט מוצג</button>
    </section>

    <section id="colorStats" class="color-stats">טוען צבעים...</section>
    <section id="colorGrid" class="color-grid" aria-live="polite"></section>
  </main>
  <nav class="gallery-bottom-nav">
    <a href="colors-gallery.html">צבעים</a>
    <a href="smart-builder.html">Builder</a>
    <a href="index.html#advancedTypography">גופנים</a>
    <a href="qa-mobile.html">בדיקה</a>
  </nav>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="colors-gallery.js"></script>
  <script src="zero-demo-guard.js"></script>
</body>
</html>
